name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install MCP package dependencies
        run: npm --prefix packages/mcp ci

      - name: Run unit + API contract tests
        run: npm test

      - name: Build (route-registry audit + Next.js production build)
        run: npm run build
